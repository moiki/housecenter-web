  SHARP CODE-vs-HUMAN/OPS LINE (the core scoping insight):
  CODE-ACTIONABLE (headlessly verifiable, in #11):
  - version 0.0.0 -> 1.0.0 + placeholder icon/splash/adaptiveIcon + app.config wiring + runtimeVersion policy.
  - a11y sweep: 4 shared form primitives (RHFTextInput/RHFSelect/RHFPickerField/RHFDateField, reused ~8 screens)
    + 4 top screens (AttachmentsSection/MoreScreen/DevicesScreen/NotificationsScreen). accessibilityLabel/Role +
    44px touch targets. (Only 1 of 36 files has a11y today.)
  - expo-screen-capture (~55.0.14) usePreventScreenCapture() app-wide (FLAG_SECURE + iOS screenshot block).
  - i18n: fix 2 hardcoded stragglers (RHFPickerField.tsx:33 'Seleccionar', RHFDateField.tsx:36 'Seleccionar fecha').
    es.json otherwise fully consistent. dayjs es-locale = NON-ISSUE (date math only).
  - PHI-TEARDOWN HARDENING (highest value, 2 REAL gaps):
    (a) AuthBootstrap.tsx:34-44 cold-start silent-refresh failure calls bare logout() but NOT clearCache() -> add it.
    (b) expo-image disk+memory cache (AuthedImage.tsx, patient/consultation photos) never cleared on logout ->
        add Image.clearMemoryCache()/clearDiskCache() at ALL 3 teardown sites (MoreScreen, api/client onRefreshFail,
        AuthBootstrap).
  - DOCS: PHI-at-rest audit + EAS release runbook.
  ALREADY SOUND (no fix): MMKV cache encrypted w/ SecureStore-sourced key (mmkv.ts:20-33); tokens/deviceId/
  pushToken in SecureStore only; no PHI/token in logs; clearCache wired on 2/3 teardown paths.

