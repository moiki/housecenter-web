notes: |
  2026-07-13 — SDD change #9 of the HouseCenter Mobile plan (8/11 done). In-app notifications list/unread
  UI in apps/mobile + remote push (FCM via expo-notifications): permission, register native device token ->
  backend subscription, receive foreground/background, deep-link the tap to the referenced item. Absorbs the
  push lifecycle DEFERRED from #5 (register after login; unsubscribe on logout this-device + revoke-all).
  Branch off main (all #1-#8 merged).

  explore  exploration.md (engram obs — sdd/mobile-notifications-push/explore) — HIGH confidence.

  KEY FINDINGS (ratify in propose):
  - Core has list/unreadCount/markRead/markAllRead ONLY -> add a SMALL ADDITIVE push-subscription surface
    (subscribePush/unsubscribePush on notificationsApi + mutation-hook pair), reusing DevicePlatform from
    auth.types. Zero changes to existing core exports (the #7/#8 additive-only discipline; web byte-unchanged).
  - API: POST /notifications/push-subscriptions {token, platform}; DELETE /notifications/push-subscriptions/
    /{token}. Upsert-by-token + dead-token pruning (missed client unsubscribe is self-healing). Payload
    {type, referenceType, referenceId}. referenceType in {"Consultation","AttentionSession"}.
  - TOKEN TYPE: getDevicePushTokenAsync() (native FCM/APNs), NOT getExpoPushTokenAsync() — backend sends raw
    FCM tokens via FirebaseAdmin. Confirmed.
  - NAVIGATORS ARE UNTYPED today (RootNavigator + TabNavigator). Cross-tab deep-link needs a navigationRef +
    typed root/tab param lists (the app's FIRST cross-tab imperative nav). AppProviders NavigationContainer
    has no ref yet.
  - AttentionSession notifications CANNOT be deep-linked (only sessionId, no patientId; no GET /sessions/{id}).
    Accept as-is, mirror web's NotificationBell (maps ONLY "Consultation").
  - PHI-IN-PUSH-BODY: consultation Title (free text) flows into push body -> lock-screen leak. Backend/product
    gap; #9 can't fix client-side. FLAG UPSTREAM.
  - Lifecycle: request permission POST-LOGIN via a PushBootstrap component gated on user!=null; cache last
    token (mirror deviceId.ts); re-register on addPushTokenListener (idempotent upsert). Unsubscribe BEFORE
    logout.mutateAsync() (logout clears accessToken on settle); best-effort on revoke-all (current device only).
  - Foreground: setNotificationHandler. Tap: addNotificationResponseReceivedListener. Cold-start:
    getLastNotificationResponseAsync() (defer until nav + auth ready).
  - UI: nest "Notificaciones" under "Más" + tab unread badge (NOT a 4th tab) — low-end/Member-first UX.
  - Config: expo-notifications @55.0.20 + config plugin (Android channel/icon/color); googleServicesFile for
    Android native token; iOS APNs entitlement (real Apple dev acct via EAS). expo-dev-client already installed;
    eas.json profiles exist -> only a new dev-client build needed. Expo Go can't get push (moot; dev-client app).

  SUGGESTED 3-PR SHAPE (stacked): PR1 (~150-250) notifications list/unread UI reusing core + Más entry + badge;
  PR2a (nav infra: navigationRef + typed root/tab param lists + REFERENCE_ROUTES, tsc-verifiable);
  PR2b (~budget Medium-High: expo-notifications dep + config plugin + PushBootstrap permission/registration +
  unsubscribe lifecycle + foreground/tap/cold-start listeners + deep-link routing). PR2b = Human/EAS smoke.

  strict_tdd:false. Verify: core tsc + web build/lint (core touched additively) + mobile tsc + expo-doctor +
  expo export. Real push delivery/permission/deep-link = Human/EAS smoke (needs dev-client build + FCM creds).

  NEXT: sdd-propose -> spec -> design -> tasks (auto fast-forward), then Review Workload Guard, then apply.

